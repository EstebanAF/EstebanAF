<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0f1c"/>
      <stop offset="50%" stop-color="#0d1526"/>
      <stop offset="100%" stop-color="#0a0f1c"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7fe7ff"/>
      <stop offset="50%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- Faint code lines background -->
  <g font-family="'Courier New', monospace" font-size="13" fill="#1e3a5f" opacity="0.55">
    <text x="30" y="40">const pipeline = async () =&gt; await automate(reports);</text>
    <text x="60" y="70">// 1 week → 4 hours</text>
    <text x="30" y="100">app.post('/api/ai', bedrock.invoke);</text>
    <text x="700" y="50">import { FastAPI } from 'production';</text>
    <text x="740" y="80">SELECT * FROM ideas WHERE shipped = true;</text>
    <text x="700" y="255">deploy --target vercel --ci</text>
    <text x="60" y="230">docker compose up -d</text>
    <text x="30" y="260">npm run build &amp;&amp; npm run ship</text>
    <text x="900" y="230">git push origin main</text>
    <text x="920" y="110">while(alive) { learn(); }</text>
  </g>

  <!-- Scanline accents -->
  <rect x="0" y="0" width="1200" height="2" fill="#38bdf8" opacity="0.35"/>
  <rect x="0" y="298" width="1200" height="2" fill="#38bdf8" opacity="0.35"/>

  <!-- Corner brackets -->
  <g stroke="#38bdf8" stroke-width="3" fill="none" opacity="0.8">
    <path d="M 25 25 L 25 60 M 25 25 L 60 25"/>
    <path d="M 1175 25 L 1175 60 M 1175 25 L 1140 25"/>
    <path d="M 25 275 L 25 240 M 25 275 L 60 275"/>
    <path d="M 1175 275 L 1175 240 M 1175 275 L 1140 275"/>
  </g>

  <!-- EAF main text -->
  <text x="600" y="150" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-size="110" font-weight="900" fill="url(#cyan)" filter="url(#glow)" letter-spacing="18">EAF</text>

  <!-- Underline -->
  <rect x="440" y="172" width="320" height="3" fill="url(#cyan)" filter="url(#softglow)" rx="2"/>

  <!-- Name -->
  <text x="600" y="208" text-anchor="middle" font-family="'Courier New', monospace" font-size="22" fill="#9fd8ef" letter-spacing="6">ESTEBAN AMAYA FONSECA</text>

  <!-- Tagline -->
  <text x="600" y="245" text-anchor="middle" font-family="'Courier New', monospace" font-size="16" fill="#5eead4" letter-spacing="2">&gt; Full-Stack · Automation · AI in Production_</text>

  <!-- Blinking cursor animation -->
  <rect x="912" y="232" width="9" height="16" fill="#5eead4">
    <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>